<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LogEverything Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.0"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.7"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
</head>
<body class="theme-dark">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar__brand">
            <span class="sidebar__logo"></span>
            <span class="sidebar__title">LogEverything</span>
        </div>

        <nav class="sidebar__nav">
            <a href="/" class="sidebar__link {% if request.url.path == '/' %}sidebar__link--active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
                </svg>
                <span>Overview</span>
            </a>
            <a href="/logs" class="sidebar__link {% if request.url.path == '/logs' %}sidebar__link--active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
                <span>Logs</span>
            </a>
            <a href="/operations" class="sidebar__link {% if request.url.path == '/operations' %}sidebar__link--active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
                </svg>
                <span>Operations</span>
            </a>
            <a href="/system" class="sidebar__link {% if request.url.path == '/system' %}sidebar__link--active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 100 6h13.5a3 3 0 100-6m-16.5-3a3 3 0 013-3h13.5a3 3 0 013 3m-19.5 0a4.5 4.5 0 01.9-2.7L5.737 5.1a3.375 3.375 0 012.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 01.9 2.7m0 0a3 3 0 01-3 3m0 3h.008v.008h-.008v-.008zm0-6h.008v.008h-.008v-.008zm-3 6h.008v.008h-.008v-.008zm0-6h.008v.008h-.008v-.008z" />
                </svg>
                <span>System</span>
            </a>
        </nav>

        <div class="sidebar__footer">
            <div class="sidebar__connection" id="sidebar-connection-status">
                <span class="status-dot {{ 'status-dot--active' if active_connection else 'status-dot--inactive' }}"></span>
                <span class="sidebar__connection-name">{{ active_connection.name if active_connection else "No Connection" }}</span>
                <button class="btn-icon btn-icon--xs" id="connection-button" title="Manage Connections">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244" />
                    </svg>
                </button>
            </div>
            <div class="sidebar__version">v0.1.0</div>
        </div>
    </aside>

    <!-- Main wrapper -->
    <div class="main-wrapper">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="dashboard-header__inner">
                <button class="btn-icon sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                    </svg>
                </button>

                <div class="dashboard-header__controls">
                    <!-- Time-range selector -->
                    <div class="time-range-selector" id="time-range-selector">
                        <button class="time-range-btn" data-hours="1">1h</button>
                        <button class="time-range-btn" data-hours="6">6h</button>
                        <button class="time-range-btn time-range-btn--active" data-hours="24">24h</button>
                        <button class="time-range-btn" data-hours="168">7d</button>
                    </div>

                    <!-- Auto-refresh toggle -->
                    <button class="btn-icon btn-icon--active" id="auto-refresh-toggle" onclick="toggleAutoRefresh()" title="Toggle Auto-Refresh (r)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182M2.985 19.644l3.181-3.182" />
                        </svg>
                    </button>

                    <!-- Export button -->
                    <button class="btn-icon" id="export-button" onclick="exportData()" title="Export Data (e)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
                        </svg>
                    </button>

                    <button class="btn-icon" id="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Trace Modal -->
    <div class="modal" id="trace-modal">
        <div class="modal__backdrop" onclick="closeTraceModal()"></div>
        <div class="modal__content">
            <div class="modal__header">
                <h3>Request Trace</h3>
                <button class="btn-icon" onclick="closeTraceModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="modal__body" id="trace-modal-body">
                <div class="loading-placeholder"><div class="loading-spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- System Detail Modal -->
    <div class="modal" id="system-detail-modal">
        <div class="modal__backdrop" onclick="closeSystemDetailModal()"></div>
        <div class="modal__content">
            <div class="modal__header">
                <h3>System Details</h3>
                <button class="btn-icon" onclick="closeSystemDetailModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="modal__body" id="system-detail-modal-body">
                <div class="loading-placeholder"><div class="loading-spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- Connection Modal -->
    {% include "partials/connection_modal.html" %}

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts -->
    <script src="{{ url_for('static', path='js/main.js') }}"></script>
    <script src="{{ url_for('static', path='js/connections.js') }}"></script>
    <script src="{{ url_for('static', path='js/charts.js') }}"></script>
    <script src="{{ url_for('static', path='js/dashboard.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
