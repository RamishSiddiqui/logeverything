name: Dashboard CI

on:
  push:
    branches: [ master, main, 'release-please--branches--main' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        python -m pip install --upgrade pip
        pip install -e "./logeverything-dashboard[dev]"

    - name: Lint with ruff
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        ruff check logeverything-dashboard/dashboard/

    - name: Format check with ruff
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        ruff format --check logeverything-dashboard/dashboard/

    - name: Build verification
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        python -m build logeverything-dashboard/

    - name: Import smoke test
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        python -c "from dashboard.cli import main"
