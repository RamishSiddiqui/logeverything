name: Dashboard CI

on:
  push:
    branches: [ master, main ]
    paths:
      - 'logeverything-dashboard/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'logeverything-dashboard/**'
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "./logeverything-dashboard[dev]"

    - name: Format check with black
      run: |
        black --check logeverything-dashboard/dashboard/

    - name: Import sorting with isort
      run: |
        isort --check-only --profile black logeverything-dashboard/dashboard/

    - name: Lint with flake8
      run: |
        flake8 logeverything-dashboard/dashboard/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 logeverything-dashboard/dashboard/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Build verification
      run: |
        python -m build logeverything-dashboard/

    - name: Import smoke test
      run: |
        python -c "from dashboard.cli import main"
