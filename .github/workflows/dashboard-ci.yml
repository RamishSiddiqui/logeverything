name: Dashboard CI

on:
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  lint-and-build:
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.head_ref, 'release-please--')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "./logeverything-dashboard[dev]"

    - name: Lint with ruff
      run: ruff check logeverything-dashboard/dashboard/

    - name: Format check with ruff
      run: ruff format --check logeverything-dashboard/dashboard/

    - name: Build verification
      run: python -m build logeverything-dashboard/

    - name: Import smoke test
      run: python -c "from dashboard.cli import main"

  ci-status:
    name: Dashboard CI Status
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.lint-and-build.result }}" == "success" || "${{ needs.lint-and-build.result }}" == "skipped" ]]; then
            echo "CI passed or skipped"
          else
            exit 1
          fi
