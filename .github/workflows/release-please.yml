on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository == 'RamishSiddiqui/logeverything'
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          target-branch: main
