name: Python CI

on:
  push:
    branches: [ master, main, 'release-please--branches--main' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"

    - name: Lint with ruff
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        ruff check logeverything

    - name: Format check with ruff
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        ruff format --check logeverything

    - name: Type check with mypy
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        mypy logeverything

    - name: Security check with bandit
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        bandit -r logeverything

    - name: Test with pytest
      if: |
        (github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch')
      run: |
        pytest --cov=logeverything --cov-report=xml tests/

    - name: Upload coverage to Codecov
      if: |
        (matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11') &&
        ((github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'release-please')) ||
        (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')) ||
        (github.event_name == 'workflow_dispatch'))
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false

  benchmark:
    runs-on: ubuntu-latest
    # Keep top-level if for benchmark as it's not typically a 'Required' check in the same way
    if: |
      github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, 'chore(main): release')
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"

    - name: Run benchmark baseline check
      run: |
        python benchmarks/check_baseline.py
