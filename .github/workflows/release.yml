name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'dashboard-v*'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  build-and-publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build all packages
      run: |
        # Build core library
        python -m build
        # Build dashboard
        cd logeverything-dashboard && python -m build && cd ..

    - name: Publish all released packages to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: .
        verbose: true
