name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          skip-labeling: true

  build-and-publish:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build all packages
      run: |
        python -m build
        cd logeverything-dashboard && python -m build && cd ..

    - name: Collect dist files
      run: |
        mkdir -p all-dists
        cp dist/* all-dists/
        cp logeverything-dashboard/dist/* all-dists/

    - name: Publish all released packages to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: all-dists/
        verbose: true
